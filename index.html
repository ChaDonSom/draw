<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f5f5f5;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas")
      const ctx = canvas.getContext("2d", {
        alpha: false,
        desynchronized: true,
        willReadFrequently: false,
      })

      const strokes = []
      const supportsPointerRawUpdate = "onpointerrawupdate" in window

      let camera = new DOMMatrix()
      let canvasRect = canvas.getBoundingClientRect()
      let inverseCamera = camera.inverse()
      let viewportCacheDirty = true

      let penDown = false
      let currentStroke = null
      let penPointer = null
      let drawQueued = false
      let sceneDirty = true

      const touches = new Map()

      function resize() {
        const dpr = devicePixelRatio

        canvas.width = canvas.clientWidth * dpr
        canvas.height = canvas.clientHeight * dpr

        viewportCacheDirty = true
        sceneDirty = true
        scheduleDraw()
      }

      function refreshViewportCache() {
        canvasRect = canvas.getBoundingClientRect()
        inverseCamera = camera.inverse()
        viewportCacheDirty = false
      }

      addEventListener("resize", resize)

      function screenToWorld(x, y) {
        if (viewportCacheDirty) {
          refreshViewportCache()
        }

        const px = x - canvasRect.left
        const py = y - canvasRect.top

        const p = new DOMPoint(px, py).matrixTransform(inverseCamera)

        return p
      }

      function screenToWorldWithMatrix(x, y) {
        if (viewportCacheDirty) {
          refreshViewportCache()
        }

        const px = x - canvasRect.left
        const py = y - canvasRect.top

        return new DOMPoint(px, py).matrixTransform(inverseCamera)
      }

      function drawStrokeSegments(stroke, startIndex = 1) {
        for (let i = startIndex; i < stroke.points.length; i++) {
          const previousPoint = stroke.points[i - 1]
          const currentPoint = stroke.points[i]

          ctx.beginPath()
          ctx.lineWidth = getStrokeWidth(previousPoint, currentPoint)
          ctx.moveTo(previousPoint.x, previousPoint.y)
          ctx.lineTo(currentPoint.x, currentPoint.y)
          ctx.stroke()
        }
      }

      function draw() {
        const dpr = devicePixelRatio

        if (sceneDirty) {
          ctx.setTransform(1, 0, 0, 1, 0, 0)
          ctx.fillStyle = "#f5f5f5"
          ctx.fillRect(0, 0, canvas.width, canvas.height)
        }

        ctx.setTransform(camera.a * dpr, camera.b * dpr, camera.c * dpr, camera.d * dpr, camera.e * dpr, camera.f * dpr)

        ctx.lineCap = "round"
        ctx.lineJoin = "round"
        ctx.strokeStyle = "black"

        if (sceneDirty) {
          for (const stroke of strokes) {
            if (stroke.points.length < 2) {
              stroke.renderedPointCount = stroke.points.length
              continue
            }

            drawStrokeSegments(stroke, 1)
            stroke.renderedPointCount = stroke.points.length
          }

          sceneDirty = false
          return
        }

        if (currentStroke && currentStroke.points.length >= 2) {
          const start = Math.max(1, currentStroke.renderedPointCount)

          if (start < currentStroke.points.length) {
            drawStrokeSegments(currentStroke, start)
            currentStroke.renderedPointCount = currentStroke.points.length
          }
        }
      }

      function scheduleDraw() {
        if (drawQueued) return

        drawQueued = true

        requestAnimationFrame(() => {
          drawQueued = false
          draw()
        })
      }

      function addStrokePoint(stroke, rawPoint, timeStamp) {
        const point = {
          x: rawPoint.x,
          y: rawPoint.y,
          pressure: rawPoint.pressure ?? 0.5,
          tiltX: rawPoint.tiltX ?? 0,
          tiltY: rawPoint.tiltY ?? 0,
          altitudeAngle: rawPoint.altitudeAngle ?? null,
          azimuthAngle: rawPoint.azimuthAngle ?? null,
        }

        const previousPoint = stroke.points[stroke.points.length - 1]

        if (previousPoint) {
          const zoom = Math.max(Math.hypot(camera.a, camera.b), 0.001)
          const minWorldDistance = 0.2 / zoom
          const movedDistance = Math.hypot(point.x - previousPoint.x, point.y - previousPoint.y)
          const pressureChange = Math.abs((point.pressure ?? 0.5) - (previousPoint.pressure ?? 0.5))

          if (movedDistance < minWorldDistance && pressureChange < 0.015) {
            return false
          }
        }

        stroke.points.push(point)

        if (!previousPoint) return true

        const elapsed = Math.max(timeStamp - stroke.lastPointTime, 1)
        const newVelocity = {
          x: (point.x - previousPoint.x) / elapsed,
          y: (point.y - previousPoint.y) / elapsed,
        }

        stroke.velocity = {
          x: stroke.velocity.x * 0.8 + newVelocity.x * 0.2,
          y: stroke.velocity.y * 0.8 + newVelocity.y * 0.2,
        }

        stroke.lastPointTime = timeStamp

        return true
      }

      function getStrokeWidth(previousPoint, currentPoint) {
        const averagePressure = ((previousPoint.pressure ?? 0.5) + (currentPoint.pressure ?? 0.5)) / 2
        const tiltMagnitude = Math.hypot(currentPoint.tiltX ?? 0, currentPoint.tiltY ?? 0)
        const tiltFactor = 1 + Math.min(tiltMagnitude / 90, 1) * 0.25

        return Math.max(1.25, 2 * (0.35 + averagePressure * 0.9) * tiltFactor)
      }

      function getPredictedPoint(stroke) {
        if (stroke.points.length < 2) return null

        const lastPoint = stroke.points[stroke.points.length - 1]

        return {
          x: lastPoint.x + stroke.velocity.x * 15,
          y: lastPoint.y + stroke.velocity.y * 15,
          pressure: lastPoint.pressure,
          tiltX: lastPoint.tiltX,
          tiltY: lastPoint.tiltY,
          altitudeAngle: lastPoint.altitudeAngle,
          azimuthAngle: lastPoint.azimuthAngle,
        }
      }

      resize()

      function handlePenPointerEvent(e) {
        if (!penDown || e.pointerId !== penPointer) return

        if (viewportCacheDirty) {
          refreshViewportCache()
        }

        const events = typeof e.getCoalescedEvents === "function" ? e.getCoalescedEvents() : []
        const samples = events.length > 0 ? events : [e]

        let addedPoint = false

        for (const sample of samples) {
          const worldPoint = screenToWorldWithMatrix(sample.clientX, sample.clientY)
          addedPoint = addStrokePoint(currentStroke, worldPoint, sample.timeStamp) || addedPoint
        }

        if (addedPoint) {
          scheduleDraw()
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (e.pointerType === "pen") {
          penDown = true

          penPointer = e.pointerId

          currentStroke = {
            points: [],
            velocity: { x: 0, y: 0 },
            lastPointTime: e.timeStamp,
            renderedPointCount: 0,
          }

          strokes.push(currentStroke)

          addStrokePoint(currentStroke, screenToWorld(e.clientX, e.clientY), e.timeStamp)

          canvas.setPointerCapture(e.pointerId)
        }

        if (e.pointerType === "touch") {
          touches.set(e.pointerId, {
            x: e.clientX,
            y: e.clientY,
          })
        }
      })
      canvas.addEventListener("pointermove", (e) => {
        if (e.pointerType === "pen" && !supportsPointerRawUpdate) {
          handlePenPointerEvent(e)
        }

        if (e.pointerType === "touch") {
          if (!touches.has(e.pointerId)) return

          touches.set(e.pointerId, {
            x: e.clientX,
            y: e.clientY,
          })

          gesture()
        }
      })

      canvas.addEventListener("pointerrawupdate", (e) => {
        if (e.pointerType === "pen") {
          handlePenPointerEvent(e)
        }
      })

      canvas.addEventListener("pointerup", (e) => {
        if (e.pointerType === "pen") {
          penDown = false
          penPointer = null
        }

        touches.delete(e.pointerId)

        lastCenter = null
        lastDistance = null
      })

      canvas.addEventListener("pointercancel", (e) => {
        touches.delete(e.pointerId)
      })

      let lastCenter = null
      let lastDistance = null

      function gesture() {
        if (touches.size === 1) {
          const p = [...touches.values()][0]

          if (lastCenter) {
            camera = camera.translate(p.x - lastCenter.x, p.y - lastCenter.y)
            viewportCacheDirty = true

            sceneDirty = true
            scheduleDraw()
          }

          lastCenter = p
        }

        if (touches.size === 2) {
          const pts = [...touches.values()]

          const center = {
            x: (pts[0].x + pts[1].x) / 2,
            y: (pts[0].y + pts[1].y) / 2,
          }

          const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y)

          if (lastDistance) {
            const scale = dist / lastDistance

            camera = camera.translate(center.x, center.y).scale(scale).translate(-center.x, -center.y)
            viewportCacheDirty = true

            sceneDirty = true
            scheduleDraw()
          }

          lastCenter = center
          lastDistance = dist
        }
      }
    </script>
  </body>
</html>
